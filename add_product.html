
<!DOCTYPE html>
<html>
<head>
<title>Add Product</title>
<style>
body { font-family: Arial; text-align:center; background:#f5f5f5; }
.box { background:white; padding:20px; margin:50px auto; width:300px; border-radius:10px; }
button { background:#2e7d32; color:white; padding:10px; border:none; }
</style>
</head>
<body>

<div class="box">
<h2>Add Product</h2>
<form method="POST" enctype="multipart/form-data">
<input name="name" placeholder="Product Name"><br><br>
<input name="p250" placeholder="250g Price"><br><br>
<input name="p500" placeholder="500g Price"><br><br>
<input name="p1kg" placeholder="1kg Price"><br><br>
<input type="file" name="image"><br><br>
<button>Add</button>
</form>
</div>

</body>
</html>
