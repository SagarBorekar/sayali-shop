
<!DOCTYPE html>
<html>
<head>
<title>Order</title>
<style>
body { font-family: Arial; text-align:center; background:#f5f5f5; }
.box { background:white; padding:20px; margin:50px auto; width:300px; border-radius:10px; }
button { background:#2e7d32; color:white; padding:10px; border:none; border-radius:5px; }
</style>
</head>
<body>

<div class="box">
<h2>{{p[1]}}</h2>
<form method="POST">
<select name="weight">
<option>250g</option>
<option>500g</option>
<option>1kg</option>
</select>
<br><br>
<input type="number" name="qty" value="1" min="1">
<br><br>
<textarea name="address" placeholder="Enter Address"></textarea>
<br><br>
<button>Place Order</button>
</form>
</div>

</body>
</html>
