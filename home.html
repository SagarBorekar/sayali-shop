
<!DOCTYPE html>
<html>
<head>
<title>Sayali Shop</title>
<style>
body { font-family: Arial; background:#f0f2f5; margin:0; }
.header { background:#2e7d32; color:white; padding:15px; text-align:center; }
.container { padding:20px; }
.card {
    background:white;
    border-radius:12px;
    padding:15px;
    margin:10px;
    display:inline-block;
    width:250px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    text-align:center;
}
img { width:120px; height:120px; border-radius:10px; }
button {
    background:#2e7d32;
    color:white;
    border:none;
    padding:8px 12px;
    margin:5px;
    border-radius:6px;
    cursor:pointer;
}
button:hover { background:#1b5e20; }
a { text-decoration:none; }
.nav { text-align:center; margin:10px; }
</style>
</head>
<body>

<div class="header">
<h1>🛍️ Sayali Agarbati & Chai Patti</h1>
</div>

<div class="nav">
<a href="/add_product"><button>➕ Add Product</button></a>
<a href="/orders"><button>📦 Orders</button></a>
<a href="/cart"><button>🛒 Cart</button></a>
<a href="/admin"><button>📊 Dashboard</button></a>
<a href="/logout"><button>🚪 Logout</button></a>
</div>

<div class="container">
{% for p in products %}
<div class="card">
<img src="{{ url_for('static', filename='images/' + p[5]) }}">
<h3>{{p[1]}}</h3>
<p>250g: ₹{{p[2]}}</p>
<p>500g: ₹{{p[3]}}</p>
<p>1kg: ₹{{p[4]}}</p>

<form action="/add_to_cart/{{p[0]}}" method="POST">

<select name="weight">
<option>250g</option>
<option>500g</option>
<option>1kg</option>
</select>

<input type="number" name="qty" value="1" min="1">

<button type="submit">🛒 Add to Cart</button>

</form>

<a href="/edit_product/{{p[0]}}"><button>✏ Edit</button></a>
<a href="/delete_product/{{p[0]}}"><button style="background:red;">❌</button></a>
</div>
{% endfor %}
</div>

</body>
</html>
